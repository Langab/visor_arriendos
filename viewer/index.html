<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor de Arriendos · Santiago</title>

  <!-- Leaflet (mapa con OpenStreetMap, sin API key) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css?v=12" />
</head>
<body>
  <!-- ====================== ENCABEZADO ====================== -->
  <header class="topbar">
    <div class="brand">
      <div class="logo">🏠</div>
      <div>
        <h1>Visor de Arriendos</h1>
        <p class="sub">Santiago · Bustamante · Lastarria · Salvador · Barrio Italia · Manuel Montt</p>
      </div>
    </div>

    <div class="stats" id="stats"><!-- inyectado por JS --></div>

    <div class="view-toggle" id="view-toggle">
      <button id="btn-lista" class="active" data-view="lista">▤ Lista</button>
      <button id="btn-mapa" data-view="mapa">◉ Mapa</button>
      <button id="btn-metricas" data-view="metricas">▰ Métricas</button>
      <button id="btn-ofertas" data-view="ofertas">💎 Ofertas</button>
      <button id="btn-temporal" data-view="temporal">↗ Análisis temporal</button>
    </div>
  </header>

  <!-- Banner de última actualización -->
  <div class="update-bar" id="update-bar"><!-- JS --></div>

  <div class="layout">
    <!-- ====================== FILTROS ====================== -->
    <aside class="filters" id="filters">
      <div class="filters-head">
        <h2>Filtros</h2>
        <button id="reset" class="link">Limpiar</button>
      </div>

      <!-- BOTÓN MATCH PERFECTO: aplica todo lo que buscamos de un golpe -->
      <button id="match-btn" class="match-btn">
        <span class="match-emoji">🎯</span>
        <span class="match-txt">
          <b>Match perfecto</b>
          <small>3 piezas (o 2D amplio) · barrio ideal · ≤ $800.000</small>
        </span>
        <span class="match-count" id="match-count">0</span>
      </button>

      <label class="field">
        <span>Buscar texto</span>
        <input type="search" id="f-texto" placeholder="calle, edificio, barrio…" />
      </label>

      <label class="field">
        <span>Arriendo máx. <strong id="f-arriendo-val"></strong></span>
        <input type="range" id="f-arriendo" min="200000" max="1000000" step="25000" value="1000000" />
        <small class="hint">Solo el arriendo (valor publicado, sin gastos comunes)</small>
      </label>

      <label class="field">
        <span>Gastos comunes máx. <strong id="f-gc-val"></strong></span>
        <input type="range" id="f-gc" min="0" max="400000" step="10000" value="400000" />
        <small class="hint">Solo los gastos comunes (reales si el aviso los trae, si no estimados)</small>
      </label>

      <label class="field">
        <span>Total mensual máx. <strong id="f-precio-val"></strong></span>
        <input type="range" id="f-precio" min="300000" max="1200000" step="25000" />
        <small class="hint">Arriendo + gastos comunes (el valor sumado)</small>
      </label>

      <label class="field">
        <span>Dormitorios mínimos</span>
        <div class="seg" id="f-dorm">
          <button data-v="0" class="active">Todos</button>
          <button data-v="1">1+</button>
          <button data-v="2">2+</button>
          <button data-v="3">3+</button>
        </div>
      </label>

      <label class="field">
        <span>Formato de precio del arriendo</span>
        <div class="seg" id="f-moneda">
          <button data-v="" class="active">Todos</button>
          <button data-v="UF">UF</button>
          <button data-v="CLP">Pesos $</button>
        </div>
      </label>

      <fieldset class="field">
        <span>Comuna</span>
        <div class="chips" id="f-comuna"><!-- JS --></div>
      </fieldset>

      <fieldset class="field">
        <span>Barrio objetivo</span>
        <div class="chips" id="f-barrio"><!-- JS --></div>
      </fieldset>

      <label class="field">
        <span>Distancia máx. al metro <strong id="f-metro-val"></strong></span>
        <input type="range" id="f-metro" min="200" max="2000" step="100" value="2000" />
        <small class="hint">Caminando a la estación más cercana</small>
      </label>

      <label class="field">
        <span>Superficie mínima <strong id="f-sup-val"></strong></span>
        <input type="range" id="f-sup" min="0" max="150" step="5" value="0" />
        <small class="hint">m² (útiles o totales según el aviso)</small>
      </label>

      <label class="field">
        <span>Antigüedad del edificio</span>
        <select id="f-antiguedad">
          <option value="">Cualquiera</option>
          <option value="30+">Más de 30 años (lo que buscan)</option>
          <option value="20+">Más de 20 años</option>
          <option value="0-10">Nuevo (menos de 10 años)</option>
          <option value="dato">Solo con dato de antigüedad</option>
        </select>
      </label>

      <fieldset class="field">
        <span>Fuente</span>
        <div class="chips" id="f-fuente"><!-- JS --></div>
      </fieldset>

      <fieldset class="field temporal-filters">
        <span>↗ Análisis temporal</span>
        <div class="switches">
          <label class="switch">
            <input type="checkbox" id="f-nuevas" />
            <span>Solo nuevas ✦ <em id="f-nuevas-n"></em></span>
          </label>
          <label class="switch">
            <input type="checkbox" id="f-bajaron" />
            <span>Solo con baja de precio ▼ <em id="f-bajaron-n"></em></span>
          </label>
        </div>
      </fieldset>

      <div class="switches">
        <label class="switch">
          <input type="checkbox" id="f-presupuesto" />
          <span>Solo dentro de presupuesto</span>
        </label>
        <label class="switch">
          <input type="checkbox" id="f-barrio-obj" />
          <span>Solo en barrios objetivo</span>
        </label>
        <label class="switch">
          <input type="checkbox" id="f-mascotas" />
          <span>Admite mascotas 🐾</span>
        </label>
        <label class="switch">
          <input type="checkbox" id="f-mariposa" />
          <span>Solo tipo mariposa 🦋</span>
        </label>
        <label class="switch">
          <input type="checkbox" id="f-ofertas" />
          <span>Solo ofertas 💎 (bajo su grupo) <em id="f-ofertas-n"></em></span>
        </label>
        <label class="switch">
          <input type="checkbox" id="f-favoritos" />
          <span>Solo favoritas ⭐</span>
        </label>
        <label class="switch">
          <input type="checkbox" id="f-ocultar-contactadas" />
          <span>Ocultar contactadas</span>
        </label>
      </div>

      <label class="field">
        <span>Ordenar por</span>
        <select id="f-orden">
          <option value="relevancia">Relevancia</option>
          <option value="precio-asc">Total: menor a mayor</option>
          <option value="precio-desc">Total: mayor a menor</option>
          <option value="m2-desc">Superficie: mayor</option>
          <option value="metro-asc">Cercanía al metro</option>
          <option value="antiguedad-desc">Antigüedad: mayor</option>
          <option value="oferta-asc">💎 Más baratas vs su grupo</option>
        </select>
      </label>
    </aside>

    <!-- ====================== CONTENIDO ====================== -->
    <main class="content">
      <div class="result-bar">
        <span id="count"></span>
        <span class="legend">
          <i class="dot good"></i> calza ·
          <i class="dot mid"></i> parcial ·
          <i class="dot bad"></i> fuera ·
          <i class="dot done"></i> contactada
        </span>
      </div>

      <section id="grid" class="grid"><!-- tarjetas --></section>
      <section id="map" class="map hidden"></section>
      <section id="metrics" class="metrics hidden"><!-- dashboard --></section>
      <section id="ofertas" class="metrics hidden"><!-- análisis por características --></section>
      <section id="temporal" class="temporal hidden"><!-- análisis temporal --></section>
    </main>
  </div>

  <!-- los datos los genera consolidate.py -->
  <script src="data.js"></script>
  <script src="app.js?v=12"></script>
</body>
</html>
